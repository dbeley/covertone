name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm build

      - name: Capacitor sync
        run: pnpm exec cap sync

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/covertone-release.keystore

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: covertone-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/covertone-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: android/app/build/outputs/apk/release/covertone-*.apk
          generate_release_notes: true
