name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint:eslint
      - run: pnpm run lint:format
      - run: pnpm run lint:svelte
      - run: pnpm test

      - run: pnpm build

  docker:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t covertone .

      - name: Test Docker image
        run: |
          docker run -d -p 8080:80 --name covertone-test covertone
          sleep 3
          curl -sSf http://localhost:8080/ > /dev/null
          docker stop covertone-test
